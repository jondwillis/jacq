# cargo-deny configuration — supply chain security gates
# Run: cargo install cargo-deny && cargo deny check
# https://embarkstudios.github.io/cargo-deny/

[graph]
all-features = false
no-default-features = false

[advisories]
# https://github.com/RustSec/advisory-db
version = 2
yanked = "deny"
ignore = []

[licenses]
version = 2
# Explicit allowlist — any other license requires explicit review and update here.
# This defends against pulling in a dep that introduces GPL/AGPL unintentionally.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "CC0-1.0",
    "MPL-2.0",
]
confidence-threshold = 0.93
exceptions = []

[bans]
# Fail on multiple versions of the same crate — forces you to audit transitive
# version conflicts rather than silently accumulating duplicates.
multiple-versions = "warn"
wildcards = "deny"
highlight = "all"
deny = []
skip = []
skip-tree = []

[sources]
# Only allow dependencies from the official crates.io registry.
# This stops a malicious Cargo.toml from pulling code from a random git URL.
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
